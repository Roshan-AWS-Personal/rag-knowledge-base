<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI KB – Chat</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --soft: #1a2330;
      --border: #263244;
      --text: #e6edf3;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      color: var(--text); background: linear-gradient(180deg, #0b0f14 0%, #0d131b 100%);
    }
    .app { display: grid; grid-template-rows: auto 1fr auto; height: 100%; max-width: 900px; margin: 0 auto; }
    header { display: flex; gap: .75rem; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); background: rgba(18,24,33,.7); backdrop-filter: blur(6px); position: sticky; top: 0; z-index: 5; }
    header h1 { font-size: 16px; margin: 0; letter-spacing: .3px; }
    header .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    header .spacer { flex: 1; }
    header button, header input[type="text"] {
      background: var(--soft); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 10px; font-size: 12px;
    }
    header button { cursor: pointer; }

    /* chat area */
    .chat { padding: 16px; overflow-y: auto; }
    .empty { color: var(--muted); text-align: center; margin-top: 2rem; }
    .msg { display: grid; grid-template-columns: 44px 1fr; gap: 10px; margin-bottom: 16px; align-items: start; }
    .avatar { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; font-weight: 700; font-size: 12px; }
    .avatar.user { background: #1f2937; border: 1px solid #2b394d; }
    .avatar.bot { background: #0f172a; border: 1px solid #1f2a3b; color: #93c5fd; }
    .bubble { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; box-shadow: 0 6px 18px rgba(0,0,0,.25); }
    .bubble p { margin: 0; line-height: 1.5; white-space: pre-wrap; }
    .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .sources { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border); }
    .sources a { color: var(--accent); text-decoration: none; font-size: 12px; display: inline-block; margin-right: 10px; }

    /* composer */
    .composer { border-top: 1px solid var(--border); background: rgba(18,24,33,.8); padding: 12px 16px; }
    .row { display: flex; gap: 10px; }
    textarea { flex: 1; resize: none; min-height: 52px; max-height: 200px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--panel); color: var(--text); }
    .send { border-radius: 12px; padding: 0 16px; min-width: 120px; background: var(--accent); border: 1px solid #3b82f6; color: #001933; font-weight: 700; cursor: pointer; }
    .send[disabled] { opacity: .6; cursor: not-allowed; }

    .row2 { display: flex; gap: 10px; margin-top: 8px; align-items: center; }
    .row2 input[type="text"] { background: var(--soft); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 12px; }
    .row2 .kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px; align-items: center; }
    .hint { color: var(--muted); font-size: 11px; }

    .error { color: var(--danger); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="dot"></div>
      <h1>AI Knowledge Base – Chat</h1>
      <div class="spacer"></div>
      <button id="btn-clear">Clear</button>
    </header>

    <main id="chat" class="chat">
      <div class="empty">Drop some files into S3 first. Then ask questions about them here. ✨</div>
    </main>

    <footer class="composer">
      <div class="row">
        <textarea id="input" placeholder="Ask anything about your documents… (Shift+Enter for newline)"></textarea>
        <button id="send" class="send">Send ▸</button>
      </div>
      <div class="row2">
        <div class="kv">
          <label for="api">API URL</label>
          <input id="api" type="text" placeholder="https://your-api.example.com/query" />
        </div>
        <div class="kv">
          <label for="auth">Bearer (optional)</label>
          <input id="auth" type="text" placeholder="sk-… or JWT (optional)" />
        </div>
        <div class="kv">
          <label for="topk">Top‑K</label>
          <input id="topk" type="text" value="4" />
        </div>
        <div class="kv">
          <label for="sys">System (opt)</label>
          <input id="sys" type="text" placeholder="You are a helpful RAG assistant." />
        </div>
      </div>
      <div class="hint">Set your <strong>API URL</strong> to your query Lambda/APIGW endpoint (e.g. <code>/query</code>). If your authorizer needs a token, paste it in <strong>Bearer</strong>. Values persist locally.</div>
    </footer>
  </div>

  <script>
    // ---- state / storage ----
    const els = {
      chat: document.getElementById('chat'),
      input: document.getElementById('input'),
      send: document.getElementById('send'),
      api: document.getElementById('api'),
      auth: document.getElementById('auth'),
      topk: document.getElementById('topk'),
      sys: document.getElementById('sys'),
      clear: document.getElementById('btn-clear')
    };

    const storage = {
      get k() { return 'ai_kb_chat_cfg_v1'; },
      load() {
        try { const j = JSON.parse(localStorage.getItem(this.k) || '{}'); return j; } catch { return {}; }
      },
      save(cfg) { localStorage.setItem(this.k, JSON.stringify(cfg)); }
    };

    const cfg = Object.assign({ api:'', bearer:'', topk:4, system:'' }, storage.load());
    els.api.value = cfg.api || '';
    els.auth.value = cfg.bearer || '';
    els.topk.value = cfg.topk || 4;
    els.sys.value = cfg.system || '';

    function persist() {
      storage.save({ api: els.api.value.trim(), bearer: els.auth.value.trim(), topk: Number(els.topk.value)||4, system: els.sys.value.trim() });
    }
    ['change','input','blur'].forEach(ev => {
      [els.api, els.auth, els.topk, els.sys].forEach(el => el.addEventListener(ev, persist));
    });

    // ---- chat rendering ----
    const history = []; // {role:'user'|'assistant', content:string, sources?:[]}

    function addMsg(role, content, sources) {
      const wrap = document.createElement('div');
      wrap.className = 'msg';
      const avatar = document.createElement('div');
      avatar.className = 'avatar ' + (role === 'user' ? 'user' : 'bot');
      avatar.textContent = role === 'user' ? 'YOU' : 'AI';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const p = document.createElement('p');
      p.textContent = content;
      bubble.appendChild(p);
      if (sources && sources.length) {
        const box = document.createElement('div');
        box.className = 'sources';
        const lbl = document.createElement('div');
        lbl.className = 'meta';
        lbl.textContent = 'Sources:';
        box.appendChild(lbl);
        for (const s of sources) {
          const a = document.createElement('a');
          a.href = s.url || '#';
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = s.title || s.key || 'source';
          box.appendChild(a);
        }
        bubble.appendChild(box);
      }
      wrap.appendChild(avatar); wrap.appendChild(bubble);
      els.chat.appendChild(wrap);
      els.chat.querySelector('.empty')?.remove();
      els.chat.scrollTop = els.chat.scrollHeight;
    }

    function addStreamingBotMsg() {
      const wrap = document.createElement('div');
      wrap.className = 'msg';
      const avatar = document.createElement('div');
      avatar.className = 'avatar bot';
      avatar.textContent = 'AI';
      const bubble = document.createElement('div'); bubble.className = 'bubble';
      const p = document.createElement('p'); p.textContent = '';
      bubble.appendChild(p);
      wrap.appendChild(avatar); wrap.appendChild(bubble);
      els.chat.appendChild(wrap); els.chat.scrollTop = els.chat.scrollHeight;
      return { p, bubble };
    }

    // ---- networking ----
    async function sendQuery(prompt) {
      const api = els.api.value.trim();
      const bearer = els.auth.value.trim();
      const topk = Number(els.topk.value) || 4;
      const system = els.sys.value.trim();
      if (!api) { alert('Set API URL first.'); return; }

      const payload = {
        question: prompt,
        top_k: topk,
        history: history.map(h => ({ role: h.role, content: h.content })),
        system: system || undefined
      };

      // Try SSE/streaming first; fall back to JSON
      try {
        const res = await fetch(api, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(bearer ? { 'Authorization': `Bearer ${bearer}` } : {})
          },
          body: JSON.stringify(Object.assign({ stream: true }, payload))
        });

        const ct = res.headers.get('content-type') || '';
        if (ct.includes('text/event-stream')) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          const { p } = addStreamingBotMsg();
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            // parse simple SSE: lines beginning with "data:"
            for (const line of chunk.split(/\r?\n/)) {
              if (line.startsWith('data:')) {
                const data = line.slice(5).trim();
                if (data === '[DONE]') break;
                try {
                  const obj = JSON.parse(data);
                  if (obj.delta) { p.textContent += obj.delta; els.chat.scrollTop = els.chat.scrollHeight; }
                } catch { /* ignore non-JSON tokens */ }
              }
            }
          }
          const answer = p.textContent.trim();
          history.push({ role:'assistant', content: answer });
          return;
        }
      } catch (e) {
        console.warn('Streaming failed, falling back to JSON:', e);
      }

      // Non-streaming JSON path
      const res2 = await fetch(els.api.value.trim(), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(els.auth.value.trim() ? { 'Authorization': `Bearer ${els.auth.value.trim()}` } : {})
        },
        body: JSON.stringify(payload)
      });

      if (!res2.ok) {
        const t = await res2.text();
        addMsg('assistant', `Error ${res2.status}: ${t}`);
        history.push({ role:'assistant', content:`Error ${res2.status}` });
        return;
      }
      const data = await res2.json();
      const answer = data.answer || data.output || data.message || JSON.stringify(data);
      addMsg('assistant', answer, data.sources || data.context || []);
      history.push({ role:'assistant', content: answer });
    }

    // ---- UX wiring ----
    function sendNow() {
      const text = els.input.value.trim();
      if (!text) return;
      addMsg('user', text);
      history.push({ role:'user', content: text });
      els.input.value = '';
      els.send.disabled = true; els.send.textContent = 'Sending…';
      sendQuery(text).finally(() => { els.send.disabled = false; els.send.textContent = 'Send ▸'; });
    }

    els.send.addEventListener('click', sendNow);
    els.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNow(); }
    });
    els.clear.addEventListener('click', () => {
      els.chat.innerHTML = '<div class="empty">New chat. Ask away. 🧠</div>';
      history.length = 0;
    });
  </script>
</body>
</html>
